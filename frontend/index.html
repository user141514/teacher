<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教练助手 · 交互原型</title>
  <style>
    :root{--purple:#6C216D;--purple-700:#571857;--purple-300:#A75FA8;--purple-tint:#F4EBF4;--orange:#E18C3F;--orange-600:#C9752B;--orange-tint:#FBEEDD;--bg:#FAF7FA;--surface:#fff;--ink:#2C2530;--muted:#8B8194;--line:#ECE5ED;--line2:#E0D6E1;--shadow:0 1px 2px rgba(44,37,48,.04),0 8px 24px rgba(108,33,109,.07);--radius:16px;--radius-sm:10px}
    *{box-sizing:border-box}html,body{margin:0}body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{cursor:pointer;border:none;background:none}button:disabled{cursor:not-allowed;opacity:.65}.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:14px 28px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px;text-align:left}.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--orange),#EBB06B);display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(225,140,63,.3)}.brand-name{font-weight:700;font-size:16px}.brand-sub{font-size:12px;color:var(--muted);margin-top:-3px}.badge-top{margin-left:auto;font-size:12px;font-weight:700;color:var(--orange-600);background:var(--orange-tint);padding:6px 13px;border-radius:8px}.wrap{max-width:1120px;margin:0 auto;padding:34px 28px 80px}.home-eyebrow,.panel-kick{font-size:12.5px;font-weight:600;letter-spacing:1.4px;color:var(--orange-600);text-transform:uppercase}.home-h1{font-size:30px;line-height:1.3;font-weight:800;margin:10px 0 8px}.home-lead{color:var(--muted);max-width:680px;margin:0 0 26px}.hero-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);max-width:760px}.btn{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(108,33,109,.26)}.btn-primary:hover{background:var(--purple-700)}.btn-accent{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(225,140,63,.3)}.btn-accent:hover{background:var(--orange-600)}.btn-ghost{background:var(--surface);border:1.5px solid var(--line2);color:var(--ink)}.btn-ghost:hover{background:var(--bg);border-color:var(--purple-300)}.ws-head{display:flex;align-items:center;gap:14px;margin-bottom:24px}.ws-title{font-size:21px;font-weight:750}.ws-grid{display:grid;grid-template-columns:236px minmax(0,1fr);gap:26px;align-items:start}.stepper{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);position:sticky;top:86px}.step{display:flex;gap:12px;padding:13px 12px;border-radius:11px;position:relative}.step.active{background:var(--orange-tint)}.step-num{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--line2);color:var(--muted);z-index:1}.step.active .step-num{background:var(--orange);border-color:var(--orange);color:#fff}.step.done .step-num{background:var(--purple);border-color:var(--purple);color:#fff}.step-tt{font-size:14px;font-weight:700;line-height:1.35}.step-sub{font-size:11.5px;color:var(--muted)}.panel{min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:460px;display:flex;flex-direction:column}.panel-head{padding:22px 26px 0}.panel-h{font-size:20px;font-weight:750;margin:6px 0 4px}.panel-desc{color:var(--muted);font-size:13.5px}.panel-body{padding:22px 26px;flex:1;min-width:0}.panel-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 26px;border-top:1px solid var(--line);background:var(--bg);border-radius:0 0 var(--radius) var(--radius)}.field{margin-bottom:18px}.flabel{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;margin-bottom:7px}.flabel .dim{font-weight:500;color:var(--muted);font-size:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}textarea,input,select{width:100%;font-size:13.5px;color:var(--ink);border:1.5px solid var(--line2);border-radius:var(--radius-sm);padding:11px 13px;background:var(--surface);resize:vertical;transition:.15s}textarea:focus,input:focus,select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-tint)}textarea{min-height:70px}.typegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}.tcard{width:100%;min-height:88px;border:2px solid var(--line);border-radius:13px;padding:15px;text-align:left}.tcard.match{border-color:var(--purple);background:var(--purple-tint);box-shadow:var(--shadow)}.note{display:block;background:var(--purple-tint);border-radius:11px;padding:12px 15px;font-size:12.5px;color:var(--purple-700);margin-bottom:16px}.reasoning{background:var(--orange-tint);border-radius:11px;padding:14px 16px;font-size:13.5px;color:#6b4a1e;border:1px solid #f0d9b8}.report{display:flex;flex-direction:column;gap:14px;min-width:0}.rcard{min-width:0;border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--surface)}.rcard-h{display:flex;align-items:center;gap:9px;font-weight:750;font-size:14.5px;margin:0 0 9px}.rlist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}.rlist li{font-size:13.5px;padding-left:18px;position:relative;color:#4A4152}.rlist li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--purple-300)}.markdown-body{min-width:0;color:#4A4152;font-size:13.5px;line-height:1.7;overflow-wrap:anywhere}.markdown-body>:first-child{margin-top:0}.markdown-body>:last-child{margin-bottom:0}.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{color:var(--ink);line-height:1.35;margin:1.15em 0 .55em}.markdown-body h1{font-size:1.55rem}.markdown-body h2{font-size:1.28rem}.markdown-body h3{font-size:1.08rem}.markdown-body h4,.markdown-body h5,.markdown-body h6{font-size:1rem}.markdown-body p{margin:.6em 0}.markdown-body ul,.markdown-body ol{margin:.6em 0;padding-left:1.55rem}.markdown-body li+li{margin-top:.28em}.markdown-body blockquote{margin:.8em 0;padding:.55em .9em;border-left:4px solid var(--orange);background:var(--orange-tint);color:#6b4a1e;border-radius:0 8px 8px 0}.markdown-body blockquote p{margin:0}.markdown-body pre{max-width:100%;margin:.8em 0;padding:13px 15px;overflow-x:auto;background:#2C2530;color:#F8F3F8;border-radius:9px;line-height:1.55;white-space:pre}.markdown-body code{font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:.9em}.markdown-body :not(pre)>code{padding:.15em .38em;background:var(--purple-tint);color:var(--purple-700);border-radius:5px}.markdown-body table{width:100%;margin:.8em 0;border-collapse:collapse;display:block;overflow-x:auto}.markdown-body th,.markdown-body td{min-width:110px;padding:8px 10px;border:1px solid var(--line2);text-align:left}.markdown-body th{background:var(--purple-tint);color:var(--purple-700)}.markdown-body a{color:var(--purple);text-decoration-thickness:1px;text-underline-offset:2px}.markdown-body hr{border:0;border-top:1px solid var(--line2);margin:1.1em 0}.markdown-body s{color:var(--muted)}.markdown-body .markdown-image{display:inline-block;padding:2px 8px;background:var(--purple-tint);color:var(--purple-700);border-radius:5px;font-size:12px}.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 12px 40px rgba(108,33,109,.14);transition:.25s;z-index:60;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #go-previous{margin-right:auto}
    @media(max-width:820px){.topbar{padding:12px 16px}.wrap{padding:24px 16px 56px}.ws-grid{grid-template-columns:minmax(0,1fr)}.stepper{position:static;display:flex;overflow-x:auto;gap:4px}.step{flex:none;min-width:150px}.typegrid,.grid2{grid-template-columns:minmax(0,1fr)}.panel-head,.panel-body,.panel-foot{padding-left:18px;padding-right:18px}.home-h1{font-size:26px}.badge-top{display:none}}
  </style>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <button class="brand" id="home-brand" type="button" aria-label="返回首页">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span><span class="brand-name">教练助手</span><span class="brand-sub">能力 × 意愿画像 · 差异化辅导</span></span>
    </button>
    <button class="top-return-home" id="top-return-home" type="button">返回首页</button>
    <div class="badge-top">管理团队</div>
  </header>
  <main class="wrap" id="app"></main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./vendor/markdown-it.min.js"></script>
  <script src="./markdown-renderer.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
