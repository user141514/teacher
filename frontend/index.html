<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教练助手 · 交互原型</title>
  <style>
    :root{--purple:#6C216D;--purple-700:#571857;--purple-300:#A75FA8;--purple-tint:#F4EBF4;--orange:#E18C3F;--orange-600:#C9752B;--orange-tint:#FBEEDD;--bg:#FAF7FA;--surface:#fff;--ink:#2C2530;--muted:#8B8194;--line:#ECE5ED;--line2:#E0D6E1;--shadow:0 1px 2px rgba(44,37,48,.04),0 8px 24px rgba(108,33,109,.07);--radius:16px;--radius-sm:10px}
    #go-previous{margin-right:auto}
    @media(max-width:820px){.topbar{padding:12px 16px}.wrap{padding:24px 16px 56px}.ws-grid{grid-template-columns:minmax(0,1fr)}.stepper{position:static;display:flex;overflow-x:auto;gap:4px}.step{flex:none;min-width:150px}.typegrid,.grid2{grid-template-columns:minmax(0,1fr)}.panel-head,.panel-body,.panel-foot{padding-left:18px;padding-right:18px}.home-h1{font-size:26px}.badge-top{display:none}}
  </style>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <button class="brand" id="home-brand" type="button" aria-label="返回首页">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span><span class="brand-name">教练助手</span><span class="brand-sub">能力 × 意愿画像 · 差异化辅导</span></span>
    </button>
    <button class="top-return-home" id="top-return-home" type="button">返回首页</button>
    <div class="badge-top">管理团队</div>
  </header>
  <main class="wrap" id="app"></main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./vendor/markdown-it.min.js"></script>
  <script src="./markdown-renderer.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
